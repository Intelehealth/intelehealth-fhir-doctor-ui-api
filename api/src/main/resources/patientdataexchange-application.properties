intelehealth.fhir.resource.location.import=LOCATION_IMPORT
intelehealth.fhir.resource.location.export=LOCATION_EXPORT
intelehealth.fhir.resource.patient.created.export=PATIENT_CREATED
intelehealth.fhir.resource.patient.modified.export=PATIENT_MODIFIED
intelehealth.fhir.resource.practitioner.export=PRACTITIONER
intelehealth.fhir.resource.encounter.export=ENCOUNTER
intelehealth.fhir.resource.observation.export=OBSERVATION
intelehealth.fhir.resource.medication.export=MEDICATION
intelehealth.fhir.resource.medication.request.export=MEDICATION_REQUEST
intelehealth.fhir.resource.service.request.export=SERVICE_REQUEST
intelehealth.fhir.resource.diagnostic.report.export=DIAGNOSTIC_REPORT
intelehealth.fhir.resource.identifier.name=MPI
intelehealth.fhir.structuredefinition.extension.url=http://intelehealth-central-fhir.mpower-social.com/fhir/StructureDefinition/
intelehealth.fhir.central.url=http://intelehealth-central-fhir.mpower-social.com/fhir
intelehealth.fhir.patient.profile.url=https://ih-ig.mpower-social.com/StructureDefinition/IH-patient-profile
intelehealth.fhir.patient.profile.definition.path=structureDefinition/StructureDefinition-IH-patient-profile.json

# for IH
#local.openmrs.openhim.url=http://192.168.19.152:5001/openmrs
#local.openmrs.openhim.clientid.password.basic.auth=openmrs:Admin123
local.openmrs.openhim.url=https://intelehealth-prod-master-new.mpower-social.com/openmrs
local.openmrs.openhim.clientid.password.basic.auth=admin:apple@1Mango
#common url
gofr.openhim.url=http://192.168.19.152:5001/fhir/DEFAULT
gofr.openhim.clientid.password.basic.auth=openmrs:Admin123

#common url
#opencr.shr.url=http://192.168.19.152:5001/shr/
opencr.shr.url=http://localhost:7001/mci/

#common url
opencr.openhim.url=http://intelehealth-central-fhir.mpower-social.com//fhir
opencr.openhim.clientid.password.basic.auth=openmrs:Admin123

# Before MCI patient save: query central OpenCR; if >=2 Patients match demographics, persist duplicate review and skip MCI.
# Set false to always POST to MCI (legacy behaviour).
intelehealth.fhir.mpi.duplicate.precheck.enabled=true
# Max Patient matches requested from OpenCR for duplicate detection (FHIR _count); must be >=2 for ambiguous saves.
intelehealth.fhir.mpi.duplicate.precheck.search.count=50

# Optional: persist FHIR validation outcomes to table fhir_resource_validation_record (see package validationrecord).
# Isolated feature; default false. When false, no aspect and no DB writes for validation audit.
intelehealth.fhir.validation.audit.store.enabled=true

# Created-patient export tuning
intelehealth.fhir.patient.export.created.parallelism=6

# Upload import: preferred OpenMRS identifier type for created patient.
intelehealth.fhir.patient.import.preferred.identifier.type.uuid=05a29f94-c0ed-11e2-94be-8c13b969e334
intelehealth.fhir.patient.import.preferred.identifier.type.name=OpenMRS ID
intelehealth.fhir.patient.import.demographic.duplicate.check.enabled=true
intelehealth.fhir.patient.import.demographic.duplicate.check.search.count=20
intelehealth.fhir.patient.import.demographic.duplicate.check.fallback.enabled=false
intelehealth.fhir.patient.import.demographic.duplicate.check.fallback.max.pages=2
intelehealth.fhir.patient.import.profile.validation.enabled=true









