# Before MCI patient save: query central OpenCR; if >=2 Patients match demographics, persist duplicate review and skip MCI.
# Set false to always POST to MCI (legacy behaviour).
intelehealth.fhir.mpi.duplicate.precheck.enabled=true
# Max Patient matches requested from OpenCR for duplicate detection (FHIR _count); must be >=2 for ambiguous saves.
intelehealth.fhir.mpi.duplicate.precheck.search.count=50

# Optional: persist FHIR validation outcomes to table fhir_resource_validation_record (see package validationrecord).
# Isolated feature; default false. When false, no aspect and no DB writes for validation audit.
intelehealth.fhir.validation.audit.store.enabled=true

# Created-patient export tuning
intelehealth.fhir.patient.export.created.parallelism=6

# Upload import: preferred OpenMRS identifier type for created patient.
intelehealth.fhir.patient.import.preferred.identifier.type.uuid=05a29f94-c0ed-11e2-94be-8c13b969e334
intelehealth.fhir.patient.import.demographic.duplicate.check.enabled=true
intelehealth.fhir.patient.import.demographic.duplicate.check.search.count=20
intelehealth.fhir.patient.import.demographic.duplicate.check.fallback.enabled=false
intelehealth.fhir.patient.import.demographic.duplicate.check.fallback.max.pages=2
intelehealth.fhir.patient.import.profile.validation.enabled=true

# When true, patient upload import persists via OpenMRS PatientService (native API) instead of FHIR2 POST Patient.
# Default false keeps existing FHIR2 create behaviour unchanged.
intelehealth.fhir.patient.import.native.create.enabled=true

# FHIR-style fuzzy patient match defaults
intelehealth.fhir.patient.match.enabled=true
intelehealth.fhir.patient.match.threshold=70
intelehealth.fhir.patient.match.confidence.high=85
intelehealth.fhir.patient.match.confidence.medium=70
intelehealth.fhir.patient.match.field.match.threshold=60
intelehealth.fhir.patient.match.max.candidates=500
intelehealth.fhir.patient.match.field.name.enabled=true
intelehealth.fhir.patient.match.field.dob.enabled=true
intelehealth.fhir.patient.match.field.phone.enabled=true
intelehealth.fhir.patient.match.field.address.enabled=true
intelehealth.fhir.patient.match.field.gender.enabled=true
intelehealth.fhir.patient.match.field.identifier.enabled=true
intelehealth.fhir.patient.match.field.name.weight=0.45
intelehealth.fhir.patient.match.field.dob.weight=0.20
intelehealth.fhir.patient.match.field.phone.weight=0.20
intelehealth.fhir.patient.match.field.address.weight=0.10
intelehealth.fhir.patient.match.field.gender.weight=0.05
intelehealth.fhir.patient.match.field.identifier.weight=0.05
intelehealth.fhir.patient.match.algorithm.name=jaro_winkler
intelehealth.fhir.patient.match.algorithm.phone=levenshtein
intelehealth.fhir.patient.match.algorithm.address=token_jaccard
intelehealth.fhir.patient.match.algorithm.phonetic.boost.enabled=true
intelehealth.fhir.patient.match.dob.near.match.days=0









